<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Metal MVP{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    >
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  </head>
  <body class="app-shell">
    <nav class="navbar navbar-expand-lg border-bottom bg-white">
      <div class="container py-2">
        <a class="navbar-brand fw-semibold text-uppercase tracking-wide" href="{{ url_for('main.dashboard') }}">
          Metal MVP
        </a>
        <div class="d-flex gap-2">
          <a class="btn btn-outline-dark btn-sm" href="{{ url_for('main.dashboard') }}">Dashboard</a>
          <a class="btn btn-primary btn-sm" href="{{ url_for('projects.new_project') }}">Nuevo proyecto</a>
        </div>
      </div>
    </nav>

    <main class="py-5">
      <div class="container">
        {% block content %}{% endblock %}
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
